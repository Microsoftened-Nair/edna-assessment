version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: ednadb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/ednadb
      - JWT_SECRET_KEY=super-secret-jwt-key
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./databases:/app/databases

volumes:
  postgres_data:
